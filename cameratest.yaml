esphome:
  name: cameratest
  friendly_name: cameratest

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "uMN1MSODuDqQF8Ywy7to54HRkl5mJjTfPLyMPVhSGps="

ota:
  - platform: esphome
    password: "4cea1953371467f170c0e4b1e31aea5f"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .lan

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Cameratest Fallback Hotspot"
    password: "6Mt1y1AjyTbh"

captive_portal:


# light:
#   - platform: esp32_rmt_led_strip
#     rmt_channel: 0
#     rgb_order: GRB
#     chipset: WS2812
#     pin: GPIO48
#     num_leds: 1
#     name: "NeoPixel Light"

status_led:
  pin: GPIO2



web_server:
  version: 2

external_components:
  - source:
      type: git
      url: https://github.com/Rudd-O/esphome_freenove_camera_component  #https://github.com/MichaKersloot/esphome_custom_components
    components: [ esp32_camera ]

# Example configuration entry
esp32_camera:
  external_clock:
    pin: GPIO15
    frequency: 20MHz
  i2c_pins:
    sda: GPIO4
    scl: GPIO5
  data_pins: [GPIO11, GPIO9, GPIO8, GPIO10, GPIO12, GPIO18, GPIO17, GPIO16]
  vsync_pin: GPIO6
  href_pin: GPIO7
  pixel_clock_pin: GPIO13
  #power_down_pin: GPIO33
  # Image settings
  #resolution: 1280x1024
  jpeg_quality: 10
  max_framerate: 30fps
  name: ESP32 Camera

esp32_camera_web_server:
  - port: 8080
    mode: stream
  - port: 8081
    mode: snapshot

switch:
  - platform: restart
    name: "ESP32 Camera Restart"
sensor:
  - platform: uptime
    name: "ESP32 Camera Uptime Sensor"
    
  - platform: wifi_signal
    name: "ESP32 Camera WiFi Signal"
    update_interval: 60s
    