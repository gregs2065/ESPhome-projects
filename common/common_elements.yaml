esphome:
  on_boot:
    - script.execute: my_dynamic_script

    
# Enable Home Assistant API
api:
  encryption:
    key: "XNxfPUAXgvqB5kB67B3uIdE8pCGHAPSxV9iduOU9Tzo="
  on_client_connected:
    - lvgl.widget.hide: boot_screen
    - logger.log:
        format: "Client %s connected to API with IP %s"
        args: ["client_info.c_str()", "client_address.c_str()"]
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus

ota:
  - platform: esphome
    password: "a3e18c67298cfe651d3501bd9b5857fa"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .lan

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  # ap:
  #   ssid: "Guiton-Template Fallback Hotspot"
  #   password: "IG6W5c1ddcAO"

captive_portal:

logger:

color:
  - id: my_red
    red: 100%
    green: 0%
    blue: 0%
  - id: my_orange
    red: 100%
    green: 50%
    blue: 0%
  - id: my_yellow
    red: 100%
    green: 100%
    blue: 0%
  - id: my_green
    red: 0%
    green: 50%
    blue: 0%
  - id: my_green_bright
    red: 0%
    green: 100%
    blue: 0%
  - id: my_blue
    red: 0%
    green: 0%
    blue: 100%
  - id: my_blue_dark
    red: 0%
    green: 0%
    blue: 50%
  - id: my_teal
    red: 0%
    green: 100%
    blue: 100%
  - id: my_gray
    red: 70%
    green: 70%
    blue: 70%
  - id: my_white
    red: 100%
    green: 100%
    blue: 100%
  - id: my_black
    red: 0%
    green: 0%
    blue: 0%

globals:
  #NOTE: Globals do not have a state so use id(page_turn_timer) > 0 not id(page_turn_timer).state > 0
  - id: page_turn_paused
    type: bool
    initial_value: "false"
  - id: page_turn_timer
    type: int
    initial_value: "0"
  - id: page_turn_interval
    type: int
    initial_value: '5'


image:
  rgb565:
    alpha_channel:
    - file: "images/dogbowl.png"
      resize: ${"100x100" if is480x320 else "65x65"}
      id: dogbowl2
    - file: images/esphome_233905.webp
      id: boot_logo
      resize: ${"200x200" if is480x320 else "150x150"}



  binary:
    - file: mdi:washing-machine
      id: washing_machine
      resize: 210x210 
    - file: mdi:washing-machine
      id: washing_machine_small
      resize: ${"30x30" if is480x320 else "25x25"}
    - file: mdi:washing-machine-alert
      id: washing_machine_alert
      resize: 210x210 
    - file: mdi:washing-machine-off
      id: washing_machine_off
      resize: 210x210 
    - file: mdi:tumble-dryer
      id: dryer
      resize: 210x210 
    - file: mdi:tumble-dryer
      id: dryer_small
      resize: ${"30x30" if is480x320 else "25x25"}
    - file: mdi:tumble-dryer-alert
      id: dryer_alert
      resize: 210x210 
    - file: mdi:tumble-dryer-off
      id: dryer_off
      resize: 210x210 
    - file: mdi:dishwasher
      id: dishwasher_icon
      resize: ${"210x210" if is480x320 else "150x150"} 
    - file: mdi:dishwasher-alert
      id: dishwasher_alert
      resize: ${"210x210" if is480x320 else "150x150"} 
    - file: mdi:dishwasher-off
      id: dishwasher_off
      resize: ${"210x210" if is480x320 else "150x150"} 
    - file: mdi:dishwasher
      id: dishwasher_icon_small
      resize: ${"30x30" if is480x320 else "25x25"}

number:
  - platform: template
    name: Screen Timeout
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: true
    min_value: 10
    max_value: 180
    step: 5
    mode: box
  - platform: template
    name: Page Delay
    optimistic: true
    id: display_page_delay
    unit_of_measurement: "s"
    initial_value: 10
    restore_value: true
    min_value: 1
    max_value: 60
    step: 1
    mode: box
    on_value:
      then:
        - globals.set:
            id: page_turn_interval
            value: !lambda 'return x;'

time:
  - platform: homeassistant
    id: my_time
    timezone: America/New_York 

    on_time:
      - hours: 2,3,4,5
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 2,3,4,5
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn






switch:
  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:

light:
  - platform: monochromatic
    output: backlight
    name: "backlight Light" 
    restore_mode: ALWAYS_ON
    id: display_backlight

interval:
  - interval: 1s
    then: 
      - script.execute: dryer_active_icon
      - script.execute: washer_active_icon
      - script.execute: dishwasher_active_icon
      - script.execute: page_turn_timer_decrement
  - interval: 0.5s
    then:
      - script.execute: dishwasher_running_anim



script:
  - id: washer_active_icon
    then:
      - if:
          condition:
            lambda: 'return id(washing_machine_status).state=="Running";'
          then:
            - lvgl.widget.update: 
                id: icon_wash
                image_recolor: my_green
            - lvgl.widget.show: icon_wash
          else:
            - if:
                condition:
                  lambda: 'return id(washing_machine_status).state=="Need Unload";'
                then:
                  - lvgl.widget.update: 
                      id: icon_wash
                      image_recolor: my_red
                  - lvgl.widget.show: icon_wash
                  - delay: 0.8s
                  - lvgl.widget.hide: icon_wash
                else:
                  - lvgl.widget.hide: icon_wash
  - id: dryer_active_icon
    then:
      - if:
          condition:
            lambda: 'return id(dryer_status).state=="Running";'
          then:
            - lvgl.widget.update: 
                id: icon_dryer
                image_recolor: my_green
            - lvgl.widget.show: icon_dryer
          else:
            - if:
                condition:
                  lambda: 'return id(dryer_status).state=="Need Unload";'
                then:
                  - lvgl.widget.update: 
                      id: icon_dryer
                      image_recolor: my_red
                  - lvgl.widget.show: icon_dryer
                  - delay: 0.7s
                  - lvgl.widget.hide: icon_dryer
                else:
                  - lvgl.widget.hide: icon_dryer
  - id: dishwasher_active_icon
    then:
      - if:
          condition:
            lambda: 'return id(dishwasher_status_message).state=="Running";'
          then:
            - lvgl.widget.update: 
                id: icon_dishwasher
                image_recolor: my_blue
            - lvgl.widget.show: icon_dishwasher

            - lvgl.widget.update: 
                id: dish_1
                image_recolor: my_blue
          else:
            - if:
                condition:
                  lambda: 'return id(dishwasher_status_message).state == "Action Required";'
                then:
                  - lvgl.widget.update: 
                      id: icon_dishwasher
                      image_recolor: my_red
                  - lvgl.widget.show: icon_dishwasher
                  - delay: 0.6s
                  - lvgl.widget.hide: icon_dishwasher


                  - lvgl.widget.update: 
                      id: dish_1
                      image_recolor: my_red
                else:
                  - lvgl.widget.hide: icon_dishwasher

                  - lvgl.widget.update: 
                      id: dish_1
                      image_recolor: my_green
  - id: page_turn_timer_decrement
    then:
      - logger.log:
          format: "page_turn_timer_decrement %d - %d"
          args: [ 'id(page_turn_paused)', 'id(page_turn_timer)' ]
      - if:
          condition:
            lambda: "return id(page_turn_timer) > 0;"
          then:
            - lambda: |-
                id(page_turn_timer) = id(page_turn_timer) - 1;
          else:
            - lambda: |-
                id(page_turn_paused) = false;
  - id: page_turn
    then:
      - if:
          condition:
            lambda: 'return !id(page_turn_paused);'
          then:
            - script.execute: page_next_alt

  - id: page_next_alt #skips certain pages that are not always active
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: dishwasher_page #the page just before green_egg_page
              - lambda: 'return isnan( id(BGE_cook_temp).state ) && isnan( id(BGE_food1_temp).state ) && isnan( id(BGE_food2_temp).state )  && isnan( id(BGE_food3_temp).state );'
          then:
            - lvgl.page.show: 
                id:  outside_page #the page just after green_egg_page  room_page
                animation: OUT_LEFT
                time: 300ms
          else:
            - lvgl.page.next: 
                animation: OUT_LEFT
                time: 300ms
      

  - id: page_prev_alt #skips certain pages that are not always active
    then:
      - if:
          condition:
            and:
              - lvgl.page.is_showing: outside_page #the page just after green_egg_page 
              - lambda: 'return isnan( id(BGE_cook_temp).state ) && isnan( id(BGE_food1_temp).state ) && isnan( id(BGE_food2_temp).state )  && isnan( id(BGE_food3_temp).state );'
          then:
            - lvgl.page.show: 
                id: dishwasher_page #the page just before green_egg_page
                animation: OUT_RIGHT
                time: 300ms
          else:
            - lvgl.page.previous: 
                animation: OUT_RIGHT
                time: 300ms

  - id: pause_page_turn
    then:
      - globals.set:
          id: page_turn_paused
          value: "true"
      - globals.set:
          id: page_turn_timer
          value: "30"
  - id: dishwasher_running_anim

    then:
      - if:
          condition:
            lambda: 'return id(dishwasher_status_message).state=="Running";'
          then:
            - if:
                condition: 
                  lvgl.page.is_showing: dishwasher_page
                then:
                  - lvgl.widget.update: 
                      id: dish_1
                      image_recolor: 0x00aaff
                  - delay: 0.5s
                  - lvgl.widget.update: 
                      id: dish_1
                      image_recolor: 0x0000ff
      
  - id: my_dynamic_script
    mode: restart # This is crucial to make the script repeat
    then:    
      # // Add your other actions here
      - lambda: |-
          ESP_LOGD("main", "The dynamic script is running!");         
      - script.execute: page_turn
      - delay: !lambda 'return (id(page_turn_interval) * 1000);'
      - script.execute: my_dynamic_script # Execute the script again to repeat the loop 


font:
  - file: "fonts/Montserrat-Bold.ttf"
    id: montserrat_60
    size: 60
    bpp: 2

