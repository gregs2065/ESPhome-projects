binary_sensor:

sensor:
  - platform: homeassistant
    id: light_brightness
    entity_id: light.greg_s_office_lights
    attribute: brightness
    on_value:
      - delay: 3s
      - lvgl.slider.update:
          id: dimmer_slider
          value: !lambda return x;

  - platform: homeassistant
    id: dishwasher_status_progress
    entity_id: sensor.dishwasher_program_progress
    internal: true

  - platform: homeassistant
    id: outside_temperature
    entity_id: sensor.my_weather_station_temp_1
    internal: true
    on_value: 
      then:
        - lvgl.label.update:
            id: outside_temperature_lbl
            text:
              format: "%.1f°"
              args: [ 'id(outside_temperature).state' ]

  - platform: homeassistant
    id: outside_humidity
    entity_id: sensor.my_weather_station_humidity_1
    internal: true
    on_value: 
      then:
        - lvgl.label.update:
            id: outside_humidity_lbl
            text:
              format: "%.0f%%"
              args: [ 'id(outside_humidity).state' ]

  - platform: homeassistant
    id: pool_temperature
    entity_id: sensor.pool_temp
    internal: true
    on_value: 
      then:
        - lvgl.label.update:
            id: pool_temperature_lbl
            text:
              format: "%.1f°"
              args: [ 'id(pool_temperature).state' ]

  - platform: homeassistant
    id: dog_feed_counter
    entity_id: counter.dog_feed_counter
    internal: true
    on_value:
      then:
      - if:
          condition:
            lambda: 'return id(dog_feed_counter).state == 1;'
          then:
            - lvgl.widget.show: dog1_1
            - lvgl.widget.hide: dog1_2
            - lvgl.widget.hide: dog1_3
          else:
            - if:
                condition:
                  lambda: 'return id(dog_feed_counter).state == 2;'
                then:
                  - lvgl.widget.show: dog1_1
                  - lvgl.widget.show: dog1_2
                  - lvgl.widget.hide: dog1_3
                else:
                  - if:
                      condition:
                        lambda: 'return id(dog_feed_counter).state == 3;'
                      then:
                        - lvgl.widget.show: dog1_1
                        - lvgl.widget.show: dog1_2
                        - lvgl.widget.show: dog1_3
                      else:
                        - lvgl.widget.hide: dog1_1
                        - lvgl.widget.hide: dog1_2
                        - lvgl.widget.hide: dog1_3

  - platform: homeassistant
    id: dog_feed_counter_2
    entity_id: counter.dog_feed_counter_2
    internal: true
    on_value:
      then:
      - if:
          condition:
            lambda: 'return id(dog_feed_counter_2).state == 1;'
          then:
            - lvgl.widget.show: dog2_1
            - lvgl.widget.hide: dog2_2
            - lvgl.widget.hide: dog2_3
          else:
            - if:
                condition:
                  lambda: 'return id(dog_feed_counter_2).state == 2;'
                then:
                  - lvgl.widget.show: dog2_1
                  - lvgl.widget.show: dog2_2
                  - lvgl.widget.hide: dog2_3
                else:
                  - if:
                      condition:
                        lambda: 'return id(dog_feed_counter_2).state == 3;'
                      then:
                        - lvgl.widget.show: dog2_1
                        - lvgl.widget.show: dog2_2
                        - lvgl.widget.show: dog2_3
                      else:
                        - lvgl.widget.hide: dog2_1
                        - lvgl.widget.hide: dog2_2
                        - lvgl.widget.hide: dog2_3

  - platform: homeassistant
    id: display_brightness
    entity_id: input_number.display_brightness
    internal: true

  - platform: homeassistant
    id: BGE_cook_temp
    entity_id: sensor.big_green_egg_cook_temp
    internal: true

  - platform: homeassistant
    id: BGE_food1_temp
    entity_id: sensor.big_green_egg_food1_temp
    internal: true

  - platform: homeassistant
    id: BGE_food2_temp
    entity_id: sensor.big_green_egg_food2_temp
    internal: true

  - platform: homeassistant
    id: BGE_food3_temp
    entity_id: sensor.big_green_egg_food3_temp
    internal: true

text_sensor:
  - platform: homeassistant
    id: notify_box_msg
    entity_id: input_text.notification_box_esp_displays
    internal: true
    on_value: 
      then:
        - lvgl.label.update:
            id: notify_msg
            text: 
              args: ["id(notify_box_msg).state.c_str()"]
              format: "%s"

  - platform: homeassistant
    id: dishwasher_lastrun
    entity_id: input_text.dishwasher_last_run
    internal: true

  - platform: homeassistant
    id: dog_last_fed
    entity_id: input_text.dog_feeding_last_time_fed
    internal: true
    on_value: 
      then:
        - lvgl.label.update:
            id: storm_fed
            text:
              format: "Storm Last Fed: %s"
              args: [ 'id(dog_last_fed).state.c_str()' ]

  - platform: homeassistant
    id: dog_last_fed_2
    entity_id: input_text.dog_feeding_2_last_time_fed
    internal: true
    on_value: 
      then:
        - lvgl.label.update:
            id: dusty_fed
            text:
              format: "Dusty Last Fed: %s"
              args: [ 'id(dog_last_fed_2).state.c_str()' ]

  - platform: homeassistant
    id: dishwasher_active
    entity_id: sensor.dishwasher_operation_state
    internal: true

  - platform: homeassistant
    id: washing_machine_active
    entity_id: input_boolean.washing_machine_started
    internal: true

  - platform: homeassistant
    id: washing_machine_status
    entity_id: input_select.washing_machine_status
    internal: true

  - platform: homeassistant
    id: dryer_status
    entity_id: input_select.dryer_status
    internal: true

  - platform: homeassistant
    id: dishwasher_status_message
    entity_id: input_select.dishwasher_status
    internal: true

  - platform: wifi_info
    ip_address:
      id: ip_address

time:
  - platform: homeassistant
    id: my_time
    timezone: America/New_York 

interval:
  - interval: 1s
    then: 
      - script.execute: dryer_active_icon
      - script.execute: washer_active_icon
      - script.execute: dishwasher_active_icon

script:
  - id: washer_active_icon
    then:
      - if:
          condition:
            lambda: 'return id(washing_machine_status).state=="Running";'
          then:
            - lvgl.widget.update: 
                id: icon_wash
                image_recolor: my_green
            - lvgl.widget.show: icon_wash
          else:
            - if:
                condition:
                  lambda: 'return id(washing_machine_status).state=="Need Unload";'
                then:
                  - lvgl.widget.update: 
                      id: icon_wash
                      image_recolor: my_red
                  - lvgl.widget.show: icon_wash
                  - delay: 0.8s
                  - lvgl.widget.hide: icon_wash
                else:
                  - lvgl.widget.hide: icon_wash
  - id: dryer_active_icon
    then:
      - if:
          condition:
            lambda: 'return id(dryer_status).state=="Running";'
          then:
            - lvgl.widget.update: 
                id: icon_dryer
                image_recolor: my_green
            - lvgl.widget.show: icon_dryer
          else:
            - if:
                condition:
                  lambda: 'return id(dryer_status).state=="Need Unload";'
                then:
                  - lvgl.widget.update: 
                      id: icon_dryer
                      image_recolor: my_red
                  - lvgl.widget.show: icon_dryer
                  - delay: 0.7s
                  - lvgl.widget.hide: icon_dryer
                else:
                  - lvgl.widget.hide: icon_dryer
  - id: dishwasher_active_icon
    then:
      - if:
          condition:
            lambda: 'return id(dishwasher_status_message).state=="Running";'
          then:
            - lvgl.widget.update: 
                id: icon_dishwasher
                image_recolor: my_blue
          else:
            - if:
                condition:
                  lambda: 'return id(dishwasher_status_message).state == "Action Required";'
                then:
                  - lvgl.widget.update: 
                      id: icon_dishwasher
                      image_recolor: my_red
                  - lvgl.widget.show: icon_dishwasher
                  - delay: 0.6s
                  - lvgl.widget.hide: icon_dishwasher
                else:
                  - lvgl.widget.hide: icon_dishwasher
