esphome:
  name: box3-template
  friendly_name: Box3 template

esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
# Enable Home Assistant API
api:
  encryption:
    key: "bEkY2jfO6olLhuNptq4jfloGGax2T6dhOJx032sRGj0="
  on_client_connected:
    - lvgl.widget.hide: boot_screen
    - logger.log:
        format: "Client %s connected to API with IP %s"
        args: ["client_info.c_str()", "client_address.c_str()"]
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus

ota:
  - platform: esphome
    password: "68ad1fdfa800c91c98237f2376007899"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Box3-Template Fallback Hotspot"
    password: "DGbhCTaCP3ZS"

captive_portal:

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

spi:
  clk_pin: 7
  mosi_pin: 6

i2c:
  - id: bus_a
    sda: GPIO08
    scl: GPIO18
    scan: true
    sda_pullup_enabled: true
    scl_pullup_enabled: true
    frequency: 100kHz

  - sda: GPIO41
    scl: GPIO40
    scan: true
    sda_pullup_enabled: true
    scl_pullup_enabled: true
    frequency: 50kHz
    id: bus_b

display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: S3BOX
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
    invert_colors: false

touchscreen:
  - platform: gt911
    i2c_id: bus_a
    address: 0x5D
    id: gt911_touchscreen
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true
    # on_touch:
    #   - lambda: id(led).turn_on().set_brightness(id(s_default_brightness).state /100).perform();
    # on_release:
    #   - script.execute: saver_enabled

light:
  - platform: monochromatic
    id: led
    name: LCD Backlight
    entity_category: config
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 50ms

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

lvgl:
  style_definitions:
    - id: my_style
      bg_color: 0xddddFF      
      border_color: 0xaaaaaa
      border_width: 5
      x: 10
      y: 30
      width: 300 #460
      height: 170 #250

    - id: footer_style
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_opa: TRANSP
      radius: 0
      pad_all: 0
      pad_row: 0
      pad_column: 0
      border_color: 0x0077b3
      text_color: 0xFFFFFF
      width: 100%
      height: 30

    - id: header_style
      bg_color: 0xffffff
      text_color: 0x000000
      width: 100%
      y: -2
      pad_all: 2
      height: 30
      border_width: 0
  buffer_size: 25%
  displays:
    - s3_box_lcd
  theme:
    switch:
      border_width: 8
      outline_pad: 10
      border_color: red
    buttonmatrix:
      bg_opa: TRANSP
      border_color: 0x0077b3
      border_width: 0
      text_color: 0xFFFFFF
      pad_all: 0
      items: # set all your buttonmatrix buttons to use your custom defined styles and font
        bg_color: 0x2F8CD8
        bg_grad_color: 0x005782
        bg_grad_dir: VER
        bg_opa: COVER
        border_color: 0x0077b3
        border_width: 1
        text_color: 0xFFFFFF
        # text_font: my_font
        pressed:
          bg_color: 0x006699
          bg_grad_color: 0x00334d
        checked:
          bg_color: 0x1d5f96
          bg_grad_color: 0x03324A
          text_color: 0x005580
  top_layer:
    widgets:
      - obj:
          styles: header_style
          align: top_left
          bg_opa: TRANSP
          
          layout: # enable the FLEX layout for the children widgets
            type: flex
            flex_flow: ROW_WRAP
            flex_align_cross: start
            flex_align_main: start
            pad_column: 5

          widgets:
            - image:
                src: washing_machine_small
                id: icon_wash
                image_recolor: my_red
                image_recolor_opa: cover
            - image:
                src: dryer_small
                id: icon_dryer
                image_recolor: my_blue
                image_recolor_opa: cover
            - image:
                src: dishwasher_icon_small
                id: icon_dishwasher
                image_recolor: my_green
                image_recolor_opa: cover
      - obj:
          styles: header_style
          align: top_right
          bg_opa: TRANSP
          layout: # enable the FLEX layout for the children widgets
            type: flex
            flex_flow: ROW_WRAP
            flex_align_cross: end
            flex_align_main: end
            pad_column: 5
          widgets:
            - label:
                text: "\uf1eb"
                text_font: montserrat_16
                id: lbl_hastatus
                hidden: true
                align: top_right
                text_align: right
      - buttonmatrix:
          align: bottom_mid
          styles: footer_style
          pad_all: 0
          outline_width: 0
          id: top_layer
          items:
            styles: footer_style
          rows:
            - buttons:
              - id: page_prev
                text: "\uF053"
                on_press:
                  then:
                    lvgl.page.previous:
              - id: page_home
                text: "\uF015"
                on_press:
                  then:
                    lvgl.page.show: outside_page
              - id: page_next
                text: "\uF054"
                on_press:
                  then:
                    lvgl.page.next:
      - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - image:
                align: CENTER
                src: boot_logo
                y: -20
            - spinner:
                align: CENTER
                y: 80
                height: 50
                width: 50
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x18bcf2
                  arc_width: 8
          on_press:
            - lvgl.widget.hide: boot_screen
      - obj:
          id: notify_box
          align: center
          hidden: true
          bg_color: 0xffeeee
          bg_opa: 75%
          radius: 15
          pad_all: 0
          border_width: 5
          border_color: 0x222222
          width: 75%
          height: 60%
          shadow_ofs_x: 15
          shadow_ofs_y: 15
          shadow_width: 30
          shadow_spread: 0

          layout: # enable the FLEX layout for the children widgets
            type: flex
            flex_flow: ROW_WRAP
            flex_align_cross: start
            flex_align_main: start
            pad_column: 5
          widgets:
            - image:
                align: CENTER
                src: dogbowl2
            - label:
                text: "My Message\n\n123"
                id: notify_msg
          on_press:
            - lvgl.widget.hide: notify_box  
  
  pages:
    - id: outside_page
      on_long_press:
      - lvgl.page.show: 
          id: main_page
      widgets:
      - obj:
          align: TOP_MID
          styles: header_style
          widgets:
            - label:
                text: "Outside Conditions"
                align: CENTER
                text_align: CENTER
      - obj:
          styles: my_style
          on_long_press:
            - lvgl.page.show: main_page
          layout: # enable the FLEX layout for the children widgets
            type: flex
            flex_flow: ROW_WRAP
            flex_align_cross: CENTER
            flex_align_main: CENTER
          text_font: montserrat_14
          widgets:
            - label:
                text: "Temperature/Humidity"
                text_color: 0x2596be
                width: 100%
            - label:
                text: "x"
                text_align: center
                text_font: montserrat_24
                width: 49%
                id: outside_temperature_lbl
            - label:
                text: "y"
                text_align: center
                text_font: montserrat_24
                width: 49%
                id: outside_humidity_lbl
            - label:
                text: "Pool Temperature"
                text_color: 0x2596be
                width: 100%
            - label:
                text: "x"
                text_align: center
                text_font: montserrat_24
                width: 100%
                id: pool_temperature_lbl
    - id: main_page
      widgets:
        - obj:
            styles: my_style
            widgets:
            - label:
                align: TOP_MID
                text: 'Hello World!'
            - switch:
                align: top_right
                id: light_switch              

            - image:
                align: center
                src: dogbowl2
                id: img_id

            - image:
                align: BOTTOM_MID
                src: dogbowl2
                id: img_id2
                radius: 11
                clip_corner: true
            - image:
                align: BOTTOM_RIGHT
                src: dogbowl2
                id: img_id3
                radius: 11
                clip_corner: true
                on_click:
                  then:
                  - lvgl.page.show: room_page
                  - lvgl.widget.show: notify_box
            on_long_press:
              - lvgl.page.show: 
                    id: room_page
    - id: room_page
      widgets:
        - obj:
            styles: my_style
            on_long_press:
              - lvgl.page.show: 
                  id: dogfeed_page
            widgets:
            - slider:
                id: dimmer_slider
                align: CENTER
                width: 220
                height: 30
                pad_all: 8
                min_value: 0
                max_value: 255
                on_release:
                  - homeassistant.action:
                      action: light.turn_on
                      data:
                        entity_id: light.greg_s_office_lights
                        brightness: !lambda return int(x);
    - id: dogfeed_page
      on_long_press:
      - lvgl.page.show: 
          id: main_page
      widgets:
      - obj:
          align: TOP_MID
          styles: header_style
          widgets:
            - label:
                text: "Dog Feeding"
                align: CENTER
                text_align: CENTER
      - obj:
          styles: my_style
          on_long_press:
            - lvgl.page.show: main_page
          layout: # enable the FLEX layout for the children widgets
            type: flex
            flex_flow: ROW_WRAP
            flex_align_cross: CENTER
            flex_align_main: CENTER
            pad_column: 5
          text_font: montserrat_24
          widgets:
                - label:
                    id: storm_fed
                    text: "Storm Last Fed: "
                    width: 100%
                - image:
                    src: dogbowl2
                    id: dog1_1
                - image:
                    src: dogbowl2
                    id: dog1_2
                - image:
                    src: dogbowl2
                    id: dog1_3
                - label:
                    id: dusty_fed
                    text: "Dusty Last Fed: "
                    width: 100%
                    # text_align: center
                - image:
                    src: dogbowl2
                    id: dog2_1
                - image:
                    src: dogbowl2
                    id: dog2_2
                - image:
                    src: dogbowl2
                    id: dog2_3

