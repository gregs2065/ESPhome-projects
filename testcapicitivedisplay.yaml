#Cheap Yellow Board ESP32-3248S035C Capacitive Touch
esphome:
  name: test_capacitive_display
  friendly_name: TestCapacitiveDisplay
  on_boot:
  - delay: 5s
  - lvgl.widget.update:
      id: light_switch
      state:
        checked: !lambda return id(rgbLed).current_values.is_on();

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    #arduino

packages:   # as a list
  - !include common/sensors.yaml
  - !include common/common_elements.yaml
  - !include common/lvgl320x480.yaml

i2c:
  sda: GPIO33
  scl: GPIO32

spi:
  - id: lcd
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

touchscreen:
  platform: gt911
  id: my_touchscreen
  # interrupt_pin: GPIO21
  update_interval: 50ms
  reset_pin: GPIO25
  transform:
    mirror_x: false
    mirror_y: true
    swap_xy: true
  on_release:
    then:
      - if:
          condition: lvgl.is_paused
          then:
            - light.turn_on: display_backlight
            - lvgl.resume:
            - lvgl.widget.redraw:
  # on_touch:
  #   - lambda: |-
  #       ESP_LOGI("start touch cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
  #           touch.x,
  #           touch.y,
  #           touch.x_raw,
  #           touch.y_raw
  #           );
  # on_update: 
  #   - lambda: |-
  #       for (auto touch: touches)  {
  #           if (touch.state <= 2) {
  #               ESP_LOGI("Touch points:", "id=%d x=%d, y=%d", touch.id, touch.x, touch.y);
  #           }
  #       }

display:
  - platform: ili9xxx
    model: ILI9341 
    spi_id: lcd
    cs_pin: GPIO15
    dc_pin: GPIO2
    id: my_display
    rotation: 90
    color_palette: 8BIT
    data_rate: 20MHz
    invert_colors: false
    dimensions: 320x480
    auto_clear_enabled: false
    update_interval: never
    
output:
  - platform: ledc
    pin: GPIO27
    id: backlight
  - platform: ledc
    id: output_red
    pin: GPIO4
    inverted: true
  - platform: ledc
    id: output_green
    pin: GPIO16
    inverted: true
  - platform: ledc
    id: output_blue
    pin: GPIO17
    inverted: true

light:
  - id: rgbLed
    platform: rgb
    name: "RGB LED"
    red: output_red
    green: output_green
    blue: output_blue
    restore_mode: ALWAYS_OFF
    default_transition_length: 2s      
    on_state:
      - lvgl.widget.update:
          id: light_switch
          state:
            checked: !lambda return !id(rgbLed).current_values.is_on();