# ININMP441
microphone:
  - platform: i2s_audio
    id: mic1
    i2s_din_pin: GPIO16 #SD; L/R - GND
    i2s_audio_id: my_i2s_audio
    adc_type: external
    channel: left
    pdm: false
    bits_per_sample: 32 bit

voice_assistant:
  microphone: mic1
  media_player: my_media_player
  use_wake_word: false
  noise_suppression_level: 2.0
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_stt_vad_start: 
    then:
      - light.turn_on: 
          id: neopix
          red: 100%
          green: 100%
          blue: 100%
          effect: "Fast Pulse"
  on_stt_end:
       then: 
         - light.turn_off: neopix
  on_error:
          - micro_wake_word.start:  
  on_end:
        then:
          - light.turn_off: neopix
          - wait_until:
              not:
                voice_assistant.is_running:
          - micro_wake_word.start:  

micro_wake_word:
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
    - light.turn_on: 
        id: neopix
        red: 0%
        green: 0%
        blue: 100%
        effect: "Fast Pulse"

  models:
    - model: okay_nabu



