esphome:
  name: esp32-s3
  friendly_name: ESP32-S3

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5

psram:
  mode: octal #Change this to quad for N8R2 and octal for N16R8
  speed: 80MHz

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "5TcfcoLnoIkGxBdV1B85GIsmin25KtnQqYFEOD0ilr0="
  on_client_connected:
        then:
          - delay: 50ms
          - micro_wake_word.start:
          - light.turn_on: backlight
  on_client_disconnected:
        then:
          - voice_assistant.stop: 

ota:
  - platform: esphome
    password: "31b4936a9162f14dee803897a8a854fb"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: .lan
  use_address: 192.168.42.208

  ap:
    ssid: "Esp32-S3 Fallback Hotspot"
    password: "AY7CnnWK1H0l"

captive_portal:

binary_sensor:
  - platform: gpio
    pin: GPIO3
    name: "My Sensor"
    on_press: 
    - micro_wake_word.stop
    - voice_assistant.start
    - light.turn_on: 
        id: neopix
        red: 100%
        green: 100%
        blue: 100%
    - display.page.show: test_page

output:
  - platform: ledc
    pin: GPIO14
    id: backlight_led
            
light:
  - platform: monochromatic
    name: "Backlight LED"
    id: backlight
    output: backlight_led
    restore_mode: ALWAYS_ON

  - platform: esp32_rmt_led_strip
    rgb_order: RGB
    chipset: WS2812
    pin: GPIO38
    num_leds: 1
    name: "NeoPixel Light"
    id: neopix
    effects:
      - pulse:
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.1s
          update_interval: 0.1s
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          transition_length: 500ms
          update_interval: 2s
      - pulse:
          name: "Asymmetrical Pulse"
          transition_length:
            on_length: 1s
            off_length: 500ms
          update_interval: 1.5s

i2s_audio:
  - id: my_i2s_audio
    i2s_lrclk_pin: GPIO4 # Mic - WS; Speaker - LRC
    i2s_bclk_pin: GPIO5 # Mic - SCK; Speaker - BCK

image:
  rgb565:
    alpha_channel:
    - file: "images/beach_background1.jpg"
      # resize: 75X75
      id: dogbowl2

spi:
- id: lcd
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13

display:
  - platform: ili9xxx
    model: ST7789V #ILI9341 
    spi_id: lcd
    cs_pin: GPIO48
    dc_pin: GPIO47
    reset_pin: GPIO21
    id: my_display
    rotation: 270
    color_palette: NONE
    data_rate: 40MHz
    invert_colors: true
    pages:
      - id: test_page
        lambda: |-
          it.image(0, 0, id(dogbowl2));


speaker:
  - id: speaker_id
    platform: i2s_audio
    dac_type: external
    i2s_dout_pin: GPIO6
    sample_rate: 48000
  - id: mixing_speaker
    platform: mixer
    output_speaker: speaker_id
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000  # Added explicit sample rate
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000  # Added explicit sample rate

media_player:
  - platform: speaker
    name: my_media_player
    id: my_media_player
    # announcement_pipeline: 
    #   speaker: speaker_id
    #   num_channels: 2
    volume_increment: 0.05
    volume_min: 0.5
    volume_max: 0.8
    task_stack_in_psram: true
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 2
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC  # FLAC is the least processor intensive codec
      num_channels: 2
      sample_rate: 48000
    on_state:
      then:
        - if:
            condition:
              media_player.is_playing:
            then:
              - micro_wake_word.stop
              - voice_assistant.stop
        - if:
            condition:
              or:
                - media_player.is_idle
                - media_player.is_paused
            then:
              - micro_wake_word.start

